global:
  scrape_interval: 5s
  evaluation_interval: 5s
  external_labels:
    monitor: 'flask-api-monitor'

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files:
  # Uncomment to use alert rules
  # - 'alert.rules'

scrape_configs:
  - job_name: 'flask-api'
    static_configs:
      - targets: ['api:3000']
    metrics_path: '/metrics'
    scrape_interval: 5s
    scrape_timeout: 10s