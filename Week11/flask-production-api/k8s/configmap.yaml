apiVersion: v1
kind: ConfigMap
metadata:
  name: flask-api-config
  namespace: flask-api
data:
  # Server Configuration
  PORT: "3000"
  HOST: "0.0.0.0"
  WORKERS: "4"
  
  # API Configuration
  API_VERSION: "1.0.0"
  API_NAME: "Flask Production API"
  
  # Logging
  LOG_LEVEL: "INFO"
  LOG_DIR: "/app/logs"
  JSON_LOGS: "true"
  
  # Rate Limiting
  RATE_LIMIT_DEFAULT: "100 per hour"
  
  # Redis Configuration (pointing to Redis service)
  REDIS_URL: "redis://redis-service:6379/1"
  REDIS_TIMEOUT: "5"
  
  # Graceful Shutdown
  GRACEFUL_SHUTDOWN_TIMEOUT: "30"
