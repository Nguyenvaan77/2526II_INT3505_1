<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<title>REST API JWT Demo</title>

<style>
body{
    font-family: Arial;
    margin:40px;
}

button{
    margin:5px;
    padding:8px 12px;
}

input{
    margin:5px;
}

pre{
    background:#f4f4f4;
    padding:15px;
    border-radius:6px;
}
</style>

</head>

<body>

<h2>JWT REST API Demo</h2>

<h3>1. Login</h3>

<input id="username" placeholder="username" value="admin">
<input id="password" placeholder="password" value="123456">

<button onclick="login()">Login</button>

<hr>

<h3>2. API Actions</h3>

<button onclick="getTasks()">GET /tasks</button>

<input id="taskId" placeholder="task id">
<button onclick="getOneTask()">GET /tasks/{id}</button>

<br>

<input id="taskName" placeholder="task name">
<button onclick="createTask()">POST /tasks</button>

<br>

<input id="updateId" placeholder="update id">
<input id="updateName" placeholder="new name">
<button onclick="updateTask()">PUT /tasks/{id}</button>

<br>

<input id="deleteId" placeholder="delete id">
<button onclick="deleteTask()">DELETE /tasks/{id}</button>

<hr>

<h3>Response JSON</h3>

<pre id="result"></pre>

<script>

const API_URL = "http://localhost:5000"


function showResult(data){
    document.getElementById("result").textContent =
        JSON.stringify(data,null,2)
}


function getToken(){
    return localStorage.getItem("token-demo")
}


function authHeader(){
    return {
        "Content-Type":"application/json",
        "Authorization":"Bearer " + getToken()
    }
}

async function login(){
    const username = document.getElementById("username").value
    const password = document.getElementById("password").value

    try {
        const res = await fetch(API_URL + "/login",{
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify({
                username:username,
                password:password
            })
        })

        const data = await res.json()

        if(res.ok && data.data && data.data.token){
            localStorage.setItem("token-demo",data.data.token)
            alert("Login successful!")
        } else {
            alert("Login failed: " + (data.message || "Unknown error"))
        }

        showResult(data)
    } catch(error) {
        alert("Error: " + error.message)
    }
}



async function getTasks(){

    const res = await fetch(API_URL + "/tasks",{
        headers:authHeader()
    })

    const data = await res.json()

    showResult(data)
}



async function getOneTask(){

    const id = document.getElementById("taskId").value

    const res = await fetch(API_URL + "/tasks/" + id,{
        headers:authHeader()
    })

    const data = await res.json()

    showResult(data)
}



async function createTask(){

    const name = document.getElementById("taskName").value

    const res = await fetch(API_URL + "/tasks",{
        method:"POST",
        headers:authHeader(),
        body:JSON.stringify({
            name:name
        })
    })

    const data = await res.json()

    showResult(data)
}



async function updateTask(){

    const id = document.getElementById("updateId").value
    const name = document.getElementById("updateName").value

    const res = await fetch(API_URL + "/tasks/" + id,{
        method:"PUT",
        headers:authHeader(),
        body:JSON.stringify({
            name:name
        })
    })

    const data = await res.json()

    showResult(data)
}



async function deleteTask(){

    const id = document.getElementById("deleteId").value

    const res = await fetch(API_URL + "/tasks/" + id,{
        method:"DELETE",
        headers:authHeader()
    })

    const data = await res.json()

    showResult(data)
}

</script>

</body>
</html>
