apiVersion: v1
kind: Service
metadata:
  name: flask-api-service
  namespace: flask-api
  labels:
    app: flask-api
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
spec:
  type: LoadBalancer
  selector:
    app: flask-api
  ports:
  - name: http
    port: 80
    targetPort: 3000
    protocol: TCP
  
  # Session affinity for consistent connections
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 10800

---
apiVersion: v1
kind: Service
metadata:
  name: flask-api-internal
  namespace: flask-api
  labels:
    app: flask-api
spec:
  type: ClusterIP
  selector:
    app: flask-api
  ports:
  - name: http
    port: 3000
    targetPort: 3000
    protocol: TCP

---
# Redis Service
apiVersion: v1
kind: Service
metadata:
  name: redis-service
  namespace: flask-api
  labels:
    app: redis
spec:
  type: ClusterIP
  clusterIP: None  # Headless service for Redis
  selector:
    app: redis
  ports:
  - name: redis
    port: 6379
    targetPort: 6379
    protocol: TCP
