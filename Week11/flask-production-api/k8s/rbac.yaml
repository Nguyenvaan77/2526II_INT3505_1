apiVersion: v1
kind: ServiceAccount
metadata:
  name: flask-api
  namespace: flask-api

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: flask-api
  namespace: flask-api
rules:
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: flask-api
  namespace: flask-api
subjects:
- kind: ServiceAccount
  name: flask-api
  namespace: flask-api
roleRef:
  kind: Role
  name: flask-api
  apiGroup: rbac.authorization.k8s.io
